services:
  api:
    image: main
    restart: always
    ports:
      - 8000:8000
    build: .
    environment:
      DATABASE_URL: postgresql://example:example@db:5432/example
    depends_on:
      db:
        condition: service_healthy
        restart: true
    
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: example
      POSTGRES_DB: example
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U example"]
      interval: 5s
      timeout: 5s
      retries: 5